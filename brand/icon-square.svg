<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="circle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.12" filter="url(#circle-glow)"/>

  <!-- Main circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#3fb950" stroke-width="4" opacity="0.9" filter="url(#circle-glow)"/>

  <!-- LEFT: Noisy, chaotic input -->
  <path d="
    M 8,256
    L 16,236 L 22,272 L 28,224 L 34,280 L 40,218
    L 46,278 L 52,228 L 58,274 L 64,216
    L 70,284 L 76,212 L 82,286 L 88,210
    L 94,282 L 100,222 L 106,276 L 112,218
    L 118,284 L 124,208 L 130,290
  " fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#glow)"/>

  <!-- THROUGH CIRCLE: Voice signal extracted -->
  <path d="
    M 130,290
    L 148,256
    Q 168,256 180,244
    L 198,220
    Q 208,208 218,228
    L 236,272
    Q 244,288 252,264
    Q 256,244 256,200
    Q 256,244 260,264
    Q 268,288 276,272
    L 294,228
    Q 304,208 314,220
    L 332,244
    Q 344,256 364,256
  " fill="none" stroke="#3fb950" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- RIGHT: Clean output -->
  <path d="
    M 364,256
    L 384,256
    Q 394,252 404,256 Q 414,260 424,256
    Q 434,252 444,256 Q 454,260 464,256
    Q 474,253 484,256 Q 494,258 504,256
  " fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" filter="url(#glow)"/>
</svg>
