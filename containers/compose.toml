#
# Burble — Podman Compose configuration (legacy).
#
# PREFER: selur-compose.toml (selur-compose or podman-compose).
# This file is retained for backwards compatibility.
#
# Services:
#   burble-server  — Elixir OTP control plane + coprocessor NIFs
#   burble-web     — ReScript SPA (nginx)
#   verisimdb      — VeriSimDB database (Rust core)
#
# Ports:
#   6473 — Burble web client (public)
#   Internal: server on 6473, VeriSimDB on 8080

[project]
name = "burble"

[services.verisimdb]
build = { context = "../../nextgen-databases/verisimdb", dockerfile = "Containerfile" }
restart = "unless-stopped"
networks = ["burble-net"]
healthcheck = { test = "wget -q --spider http://localhost:8080/health || exit 1", interval = "30s", timeout = "5s", retries = 3 }

[services.server]
build = { context = "..", dockerfile = "containers/Containerfile.server" }
depends_on = { verisimdb = { condition = "service_healthy" } }
restart = "unless-stopped"
networks = ["burble-net"]
environment = [
  "PHX_SERVER=true",
  "PORT=6473",
  "VERISIMDB_URL=http://verisimdb:8080",
  "BURBLE_TOPOLOGY=monarchic",
  "PROVEN_LIB_DIR=/app/lib/burble-0.1.0/priv",
]
# Secrets — set these at deploy time:
#   SECRET_KEY_BASE=<mix phx.gen.secret>
#   GUARDIAN_SECRET=<mix phx.gen.secret>

[services.web]
build = { context = "..", dockerfile = "containers/Containerfile.web" }
ports = ["6473:80"]
depends_on = ["server"]
restart = "unless-stopped"
networks = ["burble-net"]

[networks.burble-net]
driver = "bridge"

