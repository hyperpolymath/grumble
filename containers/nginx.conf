#
# Burble Web Client — nginx configuration for SPA routing.
#
# All non-file requests are routed to index.html so the ReScript
# SPA can handle client-side routing. Static assets are served
# directly with aggressive caching (Vite hashes filenames).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a file → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets from Vite get long cache TTL.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
